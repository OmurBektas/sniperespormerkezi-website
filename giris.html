<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oyuncu Portalı | Sniper Espor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://i.postimg.cc/Fzn4W2w9/Eren-Internet-Cafe-400.png" type="image/png">
    
    <style>
        /* =========================================
           GENEL AYARLAR & TEMA
           ========================================= */
        :root { 
            --neon-red: #ff3e3e; --dark-red: #cc0000; --whatsapp-green: #25D366;
            --bg-black: #050505; --card-bg: #0f0f0f; 
            --text-white: #ffffff; --text-gray: #888888; 
            --font-main: 'Chakra Petch', sans-serif; --font-body: 'Inter', sans-serif; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background-color: var(--bg-black); color: var(--text-white); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(circle at top, #1a0808, #050505); padding: 20px; }
        
        .back-nav { position: absolute; top: 30px; left: 50px; font-family: var(--font-main); font-weight: bold; font-size: 1.1rem; z-index: 20; }
        .back-nav a { color: #888; text-decoration: none; transition: 0.3s; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .back-nav a:hover { color: var(--neon-red); }

        /* =========================================
           FORM KUTUSU (AUTH BOX)
           ========================================= */
        .auth-box { background: linear-gradient(135deg, #111 0%, #0a0a0a 100%); border: 1px solid #222; border-radius: 10px; width: 100%; max-width: 450px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(255, 62, 62, 0.05); }
        .auth-box::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); }
        
        .auth-header { text-align: center; padding: 40px 30px 20px 30px; }
        .auth-header i { font-size: 3rem; color: var(--neon-red); margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,62,62,0.5)); }
        .auth-header h2 { font-family: var(--font-main); font-size: 2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #fff;}

        /* SEKMELER (TABS) */
        .tab-container { display: flex; border-bottom: 1px solid #222; margin-bottom: 30px; background: #080808; }
        .tab-btn { flex: 1; padding: 15px; background: transparent; border: none; color: #666; font-family: var(--font-main); font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--neon-red); background: rgba(255,62,62,0.05); }
        .tab-btn:hover:not(.active) { color: #aaa; }

        /* FORM İÇERİKLERİ */
        .form-area { padding: 0 40px 40px 40px; }
        .auth-form { display: none; flex-direction: column; gap: 20px; }
        .auth-form.active { display: flex; animation: fadeIn 0.4s ease; }

        .input-group { position: relative; }
        .input-group i { position: absolute; top: 16px; left: 15px; color: #555; }
        .input-group input { width: 100%; background: #050505; border: 1px solid #333; color: #fff; padding: 15px 15px 15px 45px; border-radius: 5px; font-family: var(--font-body); font-size: 1rem; transition: 0.3s; outline: none; }
        .input-group input:focus { border-color: var(--neon-red); box-shadow: 0 0 10px rgba(255,62,62,0.2); }

        .submit-btn { background: var(--neon-red); color: #fff; border: none; padding: 16px; border-radius: 5px; font-family: var(--font-main); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; clip-path: polygon(0 0, 100% 0, 97% 100%, 0% 100%); margin-top: 10px;}
        .submit-btn:hover { background: var(--dark-red); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,62,62,0.3); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        .error-msg { color: var(--neon-red); font-size: 0.85rem; text-align: center; display: none; font-weight: bold; background: rgba(255,62,62,0.1); padding: 10px; border-radius: 5px; border: 1px dashed var(--neon-red);}
        .success-msg { color: var(--whatsapp-green); font-size: 0.85rem; text-align: center; display: none; font-weight: bold; background: rgba(37,211,102,0.1); padding: 10px; border-radius: 5px; border: 1px dashed var(--whatsapp-green);}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .back-nav { top: 20px; left: 20px; font-size: 0.9rem; }
            .auth-box { border-radius: 10px; border-top: 2px solid var(--neon-red); }
            .auth-box::before { display: none; }
            .form-area { padding: 0 20px 30px 20px; }
            .auth-header { padding: 30px 20px 15px 20px; }
            .auth-header h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="turnuva.html"><i class="fa-solid fa-arrow-left"></i> TURNUVA SAYFASINA DÖN</a>
    </div>

    <div class="auth-box">
        <div class="auth-header">
            <i class="fa-solid fa-crosshairs"></i>
            <h2>OYUNCU PORTALI</h2>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('login')">GİRİŞ YAP</button>
            <button class="tab-btn" onclick="switchTab('register')">KAYIT OL</button>
        </div>

        <div class="form-area">
            
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="E-posta Adresi" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Şifre" required>
                </div>
                <div id="login-error" class="error-msg">Hatalı e-posta veya şifre!</div>
                <button type="submit" class="submit-btn" id="login-btn">GİRİŞ YAP <i class="fa-solid fa-right-to-bracket"></i></button>
            </form>

            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-fullname" placeholder="Ad Soyad" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-gamepad"></i>
                    <input type="text" id="reg-nickname" placeholder="Oyuncu Adı (Nickname)" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="E-posta Adresi" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Şifre (En az 6 karakter)" required minlength="6">
                </div>
                <div id="reg-error" class="error-msg">Kayıt sırasında bir hata oluştu.</div>
                <div id="reg-success" class="success-msg">Kayıt başarılı! Arenaya yönlendiriliyorsunuz...</div>
                <button type="submit" class="submit-btn" id="reg-btn">KARARGÂHA KATIL <i class="fa-solid fa-user-plus"></i></button>
            </form>

        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if(tabName === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcaSGBZFE--qB9tmWLraB4DkQuf3LtFHA",
            authDomain: "sniperespormerkezi.firebaseapp.com",
            projectId: "sniperespormerkezi",
            storageBucket: "sniperespormerkezi.firebasestorage.app",
            messagingSenderId: "633581273873",
            appId: "1:633581273873:web:cab7015b1f49823130c2b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Kullanıcı giriş yaptıysa veya zaten girişliyse turnuva sayfasına otomatik atar
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "turnuva.html";
            }
        });

        // 1. GİRİŞ YAPMA İŞLEMİ
        window.handleLogin = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorBox = document.getElementById('login-error');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            btn.disabled = true;
            btn.innerHTML = 'GİRİŞ YAPILIYOR... <i class="fa-solid fa-spinner fa-spin"></i>';
            errorBox.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Başarılı olursa sayfa yenilenir ve onAuthStateChanged devreye girip yönlendirir
            } catch (error) {
                errorBox.style.display = 'block';
                if(error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    errorBox.innerText = "E-posta adresi veya şifre yanlış.";
                } else {
                    errorBox.innerText = "Bir hata oluştu: Lütfen tekrar deneyin.";
                }
                btn.disabled = false;
                btn.innerHTML = 'GİRİŞ YAP <i class="fa-solid fa-right-to-bracket"></i>';
            }
        };

        // 2. KAYIT OLMA İŞLEMİ
        window.handleRegister = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            const errorBox = document.getElementById('reg-error');
            const successBox = document.getElementById('reg-success');
            
            const fullName = document.getElementById('reg-fullname').value;
            const nickname = document.getElementById('reg-nickname').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            btn.disabled = true;
            btn.innerHTML = 'KAYIT OLUŞTURULUYOR... <i class="fa-solid fa-spinner fa-spin"></i>';
            errorBox.style.display = 'none';

            try {
                // Firebase Auth kaydı oluştur
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Firestore veritabanına oyuncu profilini ekle (Admin paneline düşecek)
                await setDoc(doc(db, "players", user.uid), {
                    fullName: fullName,
                    nickname: nickname,
                    email: email,
                    status: "pending", // Üyelik admin onayı bekliyor
                    totalPoints: 0,
                    createdAt: new Date().toISOString()
                });

                successBox.style.display = 'block';
                
                // 1.5 saniye sonra turnuva sayfasına yönlendir
                setTimeout(() => {
                    window.location.href = "turnuva.html";
                }, 1500);

            } catch (error) {
                errorBox.style.display = 'block';
                if (error.code === 'auth/email-already-in-use') {
                    errorBox.innerText = "Bu e-posta adresi sistemde zaten kayıtlı.";
                } else if (error.code === 'auth/weak-password') {
                    errorBox.innerText = "Şifreniz çok zayıf. En az 6 karakter giriniz.";
                } else {
                    errorBox.innerText = "Bir hata oluştu. Lütfen tekrar deneyin.";
                }
                btn.disabled = false;
                btn.innerHTML = 'KARARGÂHA KATIL <i class="fa-solid fa-user-plus"></i>';
            }
        };
    </script>
</body>
</html>
